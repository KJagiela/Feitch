<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoVerse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🌎 EcoVerse - Guardião do Futuro</h1>

    <div id="hud">
        <p>Sustentabilidade</p>

        <div id="barra">
            <div id="energia"></div>
        </div>

        <span id="pontos">50%</span>
    </div>

    <div id="game">

        <div id="sol"></div>

        <div class="nuvem" style="top:80px;left:100px;"></div>
        <div class="nuvem" style="top:140px;left:500px;"></div>

        <div class="arvore" style="left:180px;"></div>
        <div class="arvore" style="left:700px;"></div>

        <div id="grama"></div>
        <div id="terra"></div>

        <div id="player"></div>

        <div class="lixo" style="left:250px;top:360px;"></div>
        <div class="lixo" style="left:500px;top:330px;"></div>
        <div class="lixo" style="left:800px;top:380px;"></div>

    </div>

    <div id="quiz">

        <h2 id="pergunta"></h2>

        <button onclick="responder(1)">
            🌱 Atitude Sustentável
        </button>

        <button onclick="responder(2)">
            🏭 Atitude Poluente
        </button>

    </div>

    <script src="app.js"></script>

</body>
</html>
